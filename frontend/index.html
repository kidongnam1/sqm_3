<!-- ── 스플래시 로딩 오버레이 ── -->
<div id="sqm-splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#070e1a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:18%;transition:opacity 0.5s ease;">
  <!-- 상단: 회사명 -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
    <div style="color:#ffffff;font-size:52px;font-weight:900;letter-spacing:6px;font-family:'Malgun Gothic','Segoe UI',sans-serif;text-shadow:0 2px 20px rgba(79,195,247,0.4);">지와이로지스</div>
    <div style="color:#4fc3f7;font-size:13px;letter-spacing:4px;margin-top:6px;opacity:0.8;">GY LOGISTICS CO., LTD.</div>
  </div>
  <!-- 하단: 앱 정보 + 진행바 -->
  <div style="text-align:center;">
    <div style="font-size:44px;margin-bottom:16px;animation:sqm-spin 1.2s linear infinite;">⚙️</div>
    <div style="color:#4fc3f7;font-size:20px;font-weight:700;letter-spacing:2px;">SQM 재고관리 시스템</div>
    <div style="color:#546e7a;font-size:13px;margin-top:8px;">v8.6.5 광양창고 — 초기화 중...</div>
    <div style="margin-top:22px;width:240px;height:4px;background:#1e3a5f;border-radius:2px;overflow:hidden;">
      <div style="height:100%;background:linear-gradient(90deg,#1565c0,#4fc3f7);border-radius:2px;animation:sqm-bar 1.8s ease-in-out infinite;"></div>
    </div>
  </div>
</div>
<style>
@keyframes sqm-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes sqm-bar  { 0%{width:0%;margin-left:0} 50%{width:70%;margin-left:15%} 100%{width:0%;margin-left:100%} }
@keyframes sqm-splash-out { 0%{opacity:1;visibility:visible} 70%{opacity:1;visibility:visible} 100%{opacity:0;visibility:hidden} }
#sqm-splash { animation: sqm-splash-out 3.5s ease forwards; }
</style>

<script>
(function(){
  function hideSplash(){
    var s=document.getElementById('sqm-splash');
    if(!s)return;
    s.style.transition='opacity 0.4s ease';
    s.style.opacity='0';
    s.style.pointerEvents='none';
    setTimeout(function(){
      if(s&&s.parentNode){s.parentNode.removeChild(s);}
    }, 450);
  }
  function tryHide(){
    hideSplash();
    setTimeout(function(){
      var s=document.getElementById('sqm-splash');
      if(s&&s.parentNode){s.parentNode.removeChild(s);}
    }, 3500);
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){setTimeout(tryHide,600);});
  } else {
    setTimeout(tryHide,600);
  }
})();
</script>
