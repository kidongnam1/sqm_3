[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    smoke: smoke tests (fast, no DB)
    unit: unit tests (imports, pure functions)
    e2e: end-to-end browser tests (requires Playwright)
    integration: requires GEMINI_API_KEY env var and real PDF files
asyncio_mode = auto
