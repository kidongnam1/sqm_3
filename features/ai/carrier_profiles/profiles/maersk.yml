# SQM v8.7.0 · carrier_profile (MAERSK)
# 역호환: 기존 Python 템플릿이 우선, 빈 필드만 보강.
id: MAERSK
name: Maersk

detect:
  keywords:
    - MAERSK
    - SCAC MAEU
    - NON-NEGOTIABLE WAYBILL
  file_prefixes:
    - MAEU
    - MSKU
    - MRKU
    - FFAU

bl:
  number_regex: 'B/L\s*(?:No\.?|:)\s*(\d{6,12})'
  format_hint: '263764814'
  page_scope: page0_to_2
  sap_page_hint: all
  bl_equals_booking_no: true

do:
  number_regex: '^\d{9,12}$'

hints:
  bl: |
    【Maersk Sea Waybill 전용 규칙】
    BL No 위치: 1페이지 우상단 'B/L No.' 라벨 바로 오른쪽
    형식 예시: 263764814 (순수 숫자 9자리)
    2~3페이지에도 'B/L: 263764814 Page : 2' 형식으로 반복됩니다.
    ⚠️ Booking No.도 같은 숫자일 수 있는데 이것은 Maersk의 정상 현상입니다.
  invoice: |
    이 서류는 Maersk 선사의 Invoice/FA입니다.
  packing: |
    이 서류는 Maersk 선사의 Packing List입니다.

containers:
  - MAEU
  - MSKU
  - MRKU
  - FFAU
