# SQM v8.7.0 · carrier_profile (ZIM) — 신규 선사 예제
# 이 1개 파일만 추가하면 YAML 플러그인을 통해
# CARRIER_TEMPLATES 에 ZIM 이 동적으로 등록됩니다.
# (단, UI 콤보박스 `CARRIER_OPTIONS` 에도 'ZIM' 을 추가해야 사용자가 선택 가능함)
#
# ⚠️ 본 파일의 정규식/좌표는 공개 샘플 기반 "합리적 추정값" 입니다.
#    실제 ZIM PDF 수신 후 반드시 검수/보정하세요.
id: ZIM
name: ZIM Integrated Shipping

detect:
  keywords:
    - ZIM INTEGRATED SHIPPING
    - ZIM LINE
    - ZIM INTEGRATED
  pattern: 'ZIM\s+INTEGRATED'
  file_prefixes:
    - ZIMU
    - ZIM

bl:
  number_regex: 'B/L\s*No\.?\s*(ZIMU\w{7,10})'
  format_hint: ZIMU1234567
  page_scope: page0
  sap_page_hint: all
  bl_equals_booking_no: false

do:
  number_regex: '^\d{9,12}$'

hints:
  bl: |
    【ZIM Bill of Lading 전용 규칙】
    BL No 위치: 우상단 'B/L No.' 라벨 오른쪽
    형식 예시: ZIMU1234567 (ZIMU로 시작하는 알파벳+숫자 혼합)
    컨테이너 prefix: ZIMU / ZCSU
    ⚠️ 실제 ZIM BL 샘플 미확보 — 파싱 후 수동 검수 권장.
  invoice: |
    이 서류는 ZIM 선사의 Invoice/FA입니다.
  packing: |
    이 서류는 ZIM 선사의 Packing List입니다.

containers:
  - ZIMU
  - ZCSU
